defaults:
  - env/mixed_libero130_metaworld50_calvin_abcd@env.train
  - env/mixed_libero130_metaworld50_calvin_abcd@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "mixed_l130_mw50_calvin_abcd_ppo_openpi_pi05_task_balance"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 50
  resume_dir: null
  ckpt_path: null

algorithm:
  # PPO + PopArt + (optional) PCGrad
  adv_type: gae
  loss_type: actor_critic
  normalize_advantages: True
  kl_penalty: kl
  reward_coef: 1.0

  # Balance granularity for PopArt/PCGrad grouping:
  # - "task": per-task (per global task_id) balancing
  # - "domain": per-domain balancing (see the other config)
  balance_scope: task

  # PopArt (needs OpenPI value head + num_tasks big enough)
  use_popart: True

  # PCGrad (optional)
  use_pcgrad: False
  pcgrad_scope: actor_critic

  # PPO hyperparams (keep consistent with existing configs)
  rollout_epoch: 8
  eval_rollout_epoch: 1
  update_epoch: 2
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    # Keep moderate; mixed env will be split across simulator_list by rank
    total_num_envs: 64
  eval:
    total_num_envs: 200
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True

  model:
    model_path: "/path/to/openpi/pi05/checkpoint_or_hf_dir"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  model:
    model_type: openpi
    model_path: ${rollout.model.model_path}
    num_action_chunks: 5
    action_dim: 7

    add_value_head: True
    # PopArt settings (task-level: one slot per global task_id)
    use_popart: True
    popart_beta: 0.0001

    openpi:
      config_name: "pi05_libero"  # choose a reasonable default; replace if needed
      num_images_in_input: 1
      value_after_vlm: True
      # IMPORTANT: total number of global tasks.
      # For libero130 + metaworld50 + calvin_abcd(1 task in current implementation) = 181.
      num_tasks: 181

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
    total_training_steps: ${runner.max_epochs}
    lr_warmup_steps: -1
    lr_scheduler: "cosine"
    num_cycles: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

