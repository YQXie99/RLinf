defaults:
  - env/metaworld_50@env.train
  - env/metaworld_50@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout, actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "metaworld_dsrl_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 40

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  # DSRL(SAC) caches rollout batches; keep moderate to avoid host-RAM OOM.
  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 200
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  agg_q: mean
  actor_agg_q: mean
  backup_entropy: False
  critic_subsample_size: 0
  critic_actor_ratio: 1

  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 5000
    sample_window_size: 5000
    min_buffer_size: 10
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 10

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    # Reduce parallel envs to lower Ray host-RAM pressure.
    total_num_envs: 64
    # Success-Rate Adaptive task sampler: p_t ∝ (1 - S_t)^α
    # task_sampler:
    #   name: success_rate_adaptive
    #   alpha: 1.0   # exponent; larger = more focus on hard tasks
    #   min_count: 1.0  # pseudocount for success rate (avoid 0/1)
  eval:
    # Keep divisible by env world size; smaller eval reduces RAM.
    total_num_envs: 96
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    group_size: 1
    use_fixed_reset_state_ids: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: /mnt/project_rlinf_hs/chenkang/RLinf_codes/RLinf_fork_metaworld/logs/metaworld_50_ppo_openpi_pi05_100_20251111-15:51:55/test_openpi_pt/checkpoints/global_step_450
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  model:
    model_path: /mnt/project_rlinf_hs/chenkang/RLinf_codes/RLinf_fork_metaworld/logs/metaworld_50_ppo_openpi_pi05_100_20251111-15:51:55/test_openpi_pt/checkpoints/global_step_450
    num_action_chunks: 5
    num_steps: 3
    add_value_head: False
    add_q_head: True
    q_head_type: "default"

    openpi:
      config_name: "pi05_metaworld"
      num_images_in_input: 1
      use_dsrl: True
      dsrl_state_dim: 4
      dsrl_action_noise_dim: 32
      dsrl_num_q_heads: 10
      dsrl_image_latent_dim: 64
      dsrl_state_latent_dim: 64
      dsrl_hidden_dims: [128, 128, 128]
      train_expert_only: True
      detach_critic_input: True
      noise_method: "flow_noise"

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5

  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False

