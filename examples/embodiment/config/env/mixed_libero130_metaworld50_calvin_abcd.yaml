simulator_type: mixed
simulator_list:
  - simulator_type: libero
    task_suite_name: libero_130
    init_params:
      camera_heights: 256
      camera_widths: 256

    # Unnormalization stats for this domain (replace with your real path).
    # For OpenPI, this typically points to a JSON that contains either:
    # - {"norm_stats": {...}} (config.json style), or
    # - direct norm stats dict (dataset_statistics.json style).
    unnorm_key: libero_130
    unnorm_key_file: "/path/to/libero130/norm_stats_or_dataset_statistics.json"

  - simulator_type: metaworld
    task_suite_name: metaworld_50
    init_params:
      camera_heights: 480
      camera_widths: 480

    unnorm_key: metaworld_50
    unnorm_key_file: "/path/to/metaworld50/norm_stats_or_dataset_statistics.json"

  - simulator_type: calvin
    task_suite_name: calvin_abcd
    init_params:
      camera_heights: 200
      camera_widths: 200

    # Calvin env in this repo currently has get_num_tasks() == 1 (single "task",
    # many trials). In task-level balance, it still occupies 1 slot.
    unnorm_key: calvin_abcd
    unnorm_key_file: "/path/to/calvin_abcd/norm_stats_or_dataset_statistics.json"

total_num_envs: null

auto_reset: False
ignore_terminations: False
max_steps_per_rollout_epoch: 512
max_episode_steps: 512 # max episode steps for truncation

use_rel_reward: True
reward_coef: 1.0
is_eval: False

seed: 0
group_size: 1
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: True

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

